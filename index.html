<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="STARify">
  <title>Resume → STAR</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <header class="page-head">
      <h1>Resume → STAR</h1>
      <p class="sub">Paste your resume bullet points. Get each one back as a short Situation / Task / Action / Result answer you can edit.</p>
    </header>

    <section class="input-section">
      <textarea id="resume-input" placeholder="Paste your resume bullets here, one per line. Example:

Led migration of legacy billing system to microservices, reducing downtime by 40%
Built a React dashboard used by 200+ internal sales reps
Automated weekly reporting, saving the team 5 hours per week"></textarea>
      <button id="generate-btn" class="primary-btn">Generate STAR answers</button>
    </section>

    <section id="results" class="results"></section>
  </main>

  <script src="star-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
