<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Interview OS">
  <title>Interview OS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">◆</span>
        <span class="brand-name">Interview OS</span>
      </div>

      <div class="search-wrap">
        <input type="search" id="search-box" placeholder="Search questions, answers, tags…" autocomplete="off">
      </div>

      <div class="stats" id="stats-bar"></div>
    </header>

    <nav class="module-nav" id="module-nav" aria-label="Modules"></nav>

    <div class="filter-row" id="filter-row"></div>

    <main class="board" id="board"></main>
  </div>

  <script src="data/star-bank.js"></script>
  <script src="data/technical-bank.js"></script>
  <script src="data/behavioral-bank.js"></script>
  <script src="app.js"></script>
</body>
</html>
